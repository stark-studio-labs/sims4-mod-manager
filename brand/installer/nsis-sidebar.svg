<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 314" width="164" height="314">
  <defs>
    <radialGradient id="sb-glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="164" height="314" fill="#0d1117"/>
  <rect width="164" height="314" fill="url(#sb-glow)"/>

  <!-- Left accent strip -->
  <rect x="0" y="0" width="4" height="314" fill="#4ade80" opacity="0.8"/>

  <!-- Plumbob icon centered in top zone -->
  <g transform="translate(42, 40)">
    <!-- Icon bg subtle -->
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#161b22" opacity="0.6"/>
    <!-- Diamond facets -->
    <polygon points="40,6 4,44 40,78 76,44" fill="none" stroke="#4ade80" stroke-width="1.8" opacity="0.85"/>
    <polygon points="40,6 4,44 40,50" fill="#1c2128" opacity="0.9"/>
    <polygon points="40,6 40,50 76,44" fill="#21262d" opacity="0.85"/>
    <polygon points="4,44 40,50 40,78" fill="#161b22" opacity="0.9"/>
    <polygon points="40,50 76,44 40,78" fill="#0d1117" opacity="0.9"/>
    <line x1="40" y1="6" x2="40" y2="50" stroke="#4ade80" stroke-width="0.8" opacity="0.35"/>
    <line x1="4" y1="44" x2="76" y2="44" stroke="#4ade80" stroke-width="0.8" opacity="0.25"/>
    <ellipse cx="40" cy="48" rx="5" ry="4" fill="#4ade80" opacity="0.65"/>
  </g>

  <!-- STARK LABS wordmark -->
  <text x="82" y="158"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="700" letter-spacing="2.5"
        fill="#e6edf3" text-anchor="middle">STARK LABS</text>

  <!-- Divider -->
  <line x1="20" y1="168" x2="144" y2="168" stroke="#30363d" stroke-width="1" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="82" y="186"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400" letter-spacing="0.5"
        fill="#8b949e" text-anchor="middle">Mod Manager</text>

  <!-- Bottom: edition badge -->
  <rect x="24" y="272" width="116" height="22" rx="11"
        fill="none" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="82" y="287"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="600" letter-spacing="0.8"
        fill="#4ade80" text-anchor="middle" opacity="0.85">v3 FORGE EDITION</text>
</svg>
