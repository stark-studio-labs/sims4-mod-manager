<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 497 58" width="497" height="58">
  <!-- NSIS Wizard Header Banner -->

  <!-- Background -->
  <rect width="497" height="58" fill="#0d1117"/>

  <!-- Bottom accent line -->
  <line x1="0" y1="57" x2="497" y2="57" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Mini Plumbob icon left -->
  <g transform="translate(14, 9)">
    <polygon points="20,3 3,22 20,40 37,22" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.85"/>
    <polygon points="20,3 3,22 20,26" fill="#1c2128"/>
    <polygon points="20,3 20,26 37,22" fill="#21262d"/>
    <polygon points="3,22 20,26 20,40" fill="#161b22"/>
    <polygon points="20,26 37,22 20,40" fill="#0d1117"/>
    <ellipse cx="20" cy="25" rx="3" ry="2.5" fill="#4ade80" opacity="0.7"/>
  </g>

  <!-- STARK LABS wordmark -->
  <text x="62" y="26"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="700" letter-spacing="1.5"
        fill="#e6edf3">STARK LABS</text>

  <!-- Subtitle -->
  <text x="62" y="44"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400"
        fill="#8b949e">Mod Manager — Setup Wizard</text>

  <!-- Right: version tag -->
  <text x="481" y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="500"
        fill="#4ade80" text-anchor="end" opacity="0.8">v3 FORGE</text>
</svg>
