<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- Ambient plumbob green glow, left-center origin -->
    <radialGradient id="bg-glow" cx="28%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <!-- Diamond glow behind icon -->
    <radialGradient id="icon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#4ade80" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <!-- Plumbob facets -->
    <linearGradient id="facet-tl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3b2e"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="facet-tr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="#0d1117"/>
  <rect width="800" height="320" fill="url(#bg-glow)"/>

  <!-- Subtle horizontal rule accent -->
  <line x1="0" y1="319" x2="800" y2="319" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>

  <!-- ── Plumbob Icon (left zone, centered vertically) ── -->
  <g transform="translate(80, 60)">
    <!-- Icon glow aura -->
    <ellipse cx="100" cy="104" rx="90" ry="80" fill="url(#icon-glow)"/>
    <!-- Diamond facets: apex=100,10 left=10,110 bottom=100,200 right=190,110 center=100,100 -->
    <polygon points="100,10 10,110 100,100" fill="url(#facet-tl)" opacity="0.95"/>
    <polygon points="100,10 100,100 190,110" fill="url(#facet-tr)" opacity="0.9"/>
    <polygon points="10,110 100,100 100,200" fill="#0d1117" opacity="0.95"/>
    <polygon points="100,100 190,110 100,200" fill="#161b22" opacity="0.9"/>
    <!-- Edge glow outline -->
    <polygon points="100,10 10,110 100,200 190,110"
             fill="none" stroke="#4ade80" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>
    <!-- Facet lines -->
    <line x1="100" y1="10" x2="100" y2="100" stroke="#4ade80" stroke-width="0.8" opacity="0.35"/>
    <line x1="10" y1="110" x2="190" y2="110" stroke="#4ade80" stroke-width="0.8" opacity="0.2"/>
    <!-- Center gem -->
    <ellipse cx="100" cy="105" rx="8" ry="5" fill="#4ade80" opacity="0.7"/>
  </g>

  <!-- ── Text zone (center-right) ── -->
  <!-- Brand line -->
  <text x="310" y="118"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="4"
        fill="#4ade80" opacity="0.9">STARK LABS</text>

  <!-- Product name -->
  <text x="308" y="162"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5"
        fill="#e6edf3">Mod Manager</text>

  <!-- Tagline -->
  <text x="310" y="192"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="400"
        fill="#8b949e">Install once. Play forever.</text>

  <!-- Edition badge -->
  <rect x="308" y="210" width="128" height="26" rx="13"
        fill="none" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="372" y="227"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600" letter-spacing="1"
        fill="#4ade80" text-anchor="middle" opacity="0.9">v3 FORGE EDITION</text>
</svg>
