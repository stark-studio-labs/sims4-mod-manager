<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Plumbob green glow radial -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#4ade80" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <!-- Diamond facet fills -->
    <linearGradient id="facet-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3b2e"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="facet-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="facet-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="facet-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0a0e13"/>
    </linearGradient>
    <!-- Edge glow stroke -->
    <filter id="edge-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background: near-black -->
  <rect width="1024" height="1024" fill="#0d1117" rx="180"/>

  <!-- Glow aura behind diamond -->
  <ellipse cx="512" cy="520" rx="320" ry="300" fill="url(#glow)"/>

  <!-- === PLUMBOB DIAMOND === -->
  <!-- The diamond is composed of 4 facets from center point -->
  <!-- Apex: 512, 160 | Left: 200, 520 | Bottom: 512, 880 | Right: 824, 520 -->

  <!-- Top-left facet (lighter — catches light) -->
  <polygon points="512,160 200,520 512,480" fill="url(#facet-top)" opacity="0.95"/>

  <!-- Top-right facet (mid-tone) -->
  <polygon points="512,160 512,480 824,520" fill="url(#facet-right)" opacity="0.9"/>

  <!-- Bottom-left facet (dark) -->
  <polygon points="200,520 512,480 512,880" fill="url(#facet-left)" opacity="0.95"/>

  <!-- Bottom-right facet (mid) -->
  <polygon points="512,480 824,520 512,880" fill="url(#facet-bottom)" opacity="0.9"/>

  <!-- Plumbob green edge strokes — the glow outline -->
  <polygon points="512,160 200,520 512,880 824,520"
           fill="none"
           stroke="#4ade80"
           stroke-width="2.5"
           stroke-linejoin="round"
           opacity="0.9"
           filter="url(#edge-glow)"/>

  <!-- Interior division lines (facet edges) -->
  <line x1="512" y1="160" x2="512" y2="480" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="520" x2="824" y2="520" stroke="#4ade80" stroke-width="1" opacity="0.25"/>
  <line x1="512" y1="480" x2="512" y2="880" stroke="#4ade80" stroke-width="0.8" opacity="0.2"/>

  <!-- Center gem highlight -->
  <ellipse cx="512" cy="490" rx="28" ry="18"
           fill="#4ade80" opacity="0.12"/>
  <ellipse cx="512" cy="490" rx="10" ry="7"
           fill="#4ade80" opacity="0.6"/>

  <!-- "SL" monogram — visible at 512px+ -->
  <text x="512" y="548"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="72"
        font-weight="700"
        fill="#e6edf3"
        text-anchor="middle"
        letter-spacing="-2"
        opacity="0.85">SL</text>
</svg>
